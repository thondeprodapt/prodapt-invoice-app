<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRODAPT CSV Item List</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #14213d;
        --muted: #617084;
        --line: #d9e2ea;
        --paper: #ffffff;
        --surface: #f4f7f9;
        --brand: #0f766e;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--surface);
        color: var(--ink);
      }

      .shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 18px 16px 32px;
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 5vw, 2.6rem);
        letter-spacing: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: var(--paper);
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
      }

      .count {
        margin: 0 0 12px;
        color: var(--muted);
        font-weight: 800;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
      }

      table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
        text-align: left;
        vertical-align: top;
      }

      th {
        position: sticky;
        top: 0;
        background: #eef5f4;
        color: var(--brand);
        font-size: 0.78rem;
        text-transform: uppercase;
      }

      td {
        font-size: 0.9rem;
      }

      td.number {
        width: 110px;
        text-align: right;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <h1>PRODAPT CSV Item List</h1>
        <div class="actions">
          <a href="index.html">Back to app</a>
          <a href="wave-products-import.csv" download>Download CSV</a>
        </div>
      </div>
      <p class="count" id="count">Loading items...</p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Description</th>
              <th>Price</th>
              <th>Cost</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>
    <script src="wave-items.js?v=20260630-prices"></script>
    <script>
      const items = Array.isArray(window.PRODAPT_WAVE_ITEMS) ? window.PRODAPT_WAVE_ITEMS : [];
      const currency = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" });
      const escapeHtml = (value) => String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));

      document.querySelector("#count").textContent = `${items.length} CSV items loaded`;
      document.querySelector("#rows").innerHTML = items.map((item) => `
        <tr>
          <td>${escapeHtml(item.name)}</td>
          <td>${escapeHtml(item.description)}</td>
          <td class="number">${currency.format(Number(item.price) || 0)}</td>
          <td class="number">${currency.format(Number(item.cost) || 0)}</td>
        </tr>
      `).join("");
    </script>
  </body>
</html>
